<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="<%= REACT_APP_DESCRIPTION %>">

    <!--
      The Open Graph protocol allows links to be expanded by Twitter, Facebook, and other platforms.
      The variables specified here (and in title) are located in .env
    -->
    <meta property="og:image" content="<%= REACT_APP_IMAGE_URL %>" />
    <meta property="og:site_name" content="<%= REACT_APP_SITE_NAME %>" />
    <meta property="og:type" content="object" />
    <meta property="og:title" content="<%= REACT_APP_TITLE %>" />
    <meta property="og:description" content="<%= REACT_APP_DESCRIPTION %>" />
    <meta property="og:url" content="<%= REACT_APP_URL %>" />

    <link rel="manifest" href="<%= assetPrefix %>/manifest.json">
    <link rel="shortcut icon" href="<%= assetPrefix %>/favicon.ico">
    <title><%= REACT_APP_TITLE %></title>
  </head>
  <body>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
